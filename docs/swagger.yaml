  version: "1.0"
paths:
  /v1/kriteria:
    get:
      description: Endpoint untuk mengambil daftar kriteria yang aktif
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Base'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Base'
      summary: Ambil Semua Data Kriteria
      tags:
      - Kriteria
    post:
      consumes:
      - application/json
      description: Endpoint ini digunakan untuk menambahkan Kriteria baru ke database.
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Data Kriteria
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/master.RequestKriteriaFormat'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Base'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Base'
      summary: Tambah data Kriteria baru
      tags:
      - Kriteria
  /v1/kriteria/{id}:
