            $ref: '#/definitions/response.Base'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Base'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Base'
      summary: Ambil detail Kriteria by ID
      tags:
      - Kriteria
    put:
      consumes:
      - application/json
      description: Endpoint ini digunakan untuk memperbarui data Kriteria berdasarkan
        ID yang dikirimkan di path.
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: ID Kriteria
        in: path
        name: id
        required: true
        type: string
      - description: Data Kriteria yang diperbarui
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/master.RequestKriteriaFormat'
      produces:
      - application/json
      responses:
        "200":
