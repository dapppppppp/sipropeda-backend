        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Base'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Base'
      summary: Hapus Kriteria by ID (Soft Delete)
      tags:
      - Kriteria
    get:
      description: Endpoint ini digunakan untuk mengambil satu data Kriteria berdasarkan
        ID.
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
